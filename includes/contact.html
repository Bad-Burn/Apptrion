<!-- Contact Section -->
<section id="contact" class="contact">
    <div class="container">
        <div class="contact-wrapper">
            <div class="contact-info" data-aos="fade-right" data-aos-duration="1000">
                <div class="section-header">
                    <h2>Get In Touch</h2>
                    <p class="section-subtitle">We'd love to hear from you. Let's start a conversation.</p>
                </div>
                <div class="contact-details">
                    <div class="detail-item">
                        
                        <div>
                            <p class="detail-label">Email</p>
                            <a href="mailto:janjacobdriodoco@gmail.com">janjacobdriodoco@gmail.com</a>
                        </div>
                    </div>
                    <div class="detail-item">
                        <div>
                            <p class="detail-label">Email</p>
                            <a href="mailto:lovely@apptrion.com">helaenahteodoro@gmail.com</a>
                        </div>
                    </div>
                    <div class="detail-item">
                        <div>
                            <p class="detail-label">Email</p>
                            <a href="mailto:czam@apptrion.com">czamsalinas@gmail.com</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="contact-form-wrapper" data-aos="fade-left" data-aos-duration="1000">
                <form id="contact-form" method="POST">
                    <div class="form-group">
                        <label for="contact-name">Full Name</label>
                        <input type="text" id="contact-name" name="name" placeholder="Your full name" required>
                    </div>
                    <div class="form-group">
                        <label for="contact-email">Email Address</label>
                        <input type="email" id="contact-email" name="email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="contact-message">Message</label>
                        <textarea id="contact-message" name="message" placeholder="Tell us about your inquiry..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-large">Send Message</button>
                </form>
            </div>
        </div>
    </div>
</section>
